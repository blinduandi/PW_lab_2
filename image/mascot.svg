<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Glass pane body -->
  <rect x="20" y="15" width="80" height="90" rx="8" ry="8" fill="#5BC0DE" stroke="#2A7A8C" stroke-width="3" opacity="0.85"/>
  <!-- Window frame cross -->
  <line x1="60" y1="15" x2="60" y2="105" stroke="#2A7A8C" stroke-width="3"/>
  <line x1="20" y1="60" x2="100" y2="60" stroke="#2A7A8C" stroke-width="3"/>
  <!-- Shine reflection -->
  <rect x="28" y="22" width="25" height="30" rx="3" fill="white" opacity="0.35"/>
  <!-- Eyes -->
  <ellipse cx="45" cy="45" rx="6" ry="7" fill="#202024"/>
  <ellipse cx="75" cy="45" rx="6" ry="7" fill="#202024"/>
  <!-- Eye shine -->
  <circle cx="47" cy="43" r="2.5" fill="white"/>
  <circle cx="77" cy="43" r="2.5" fill="white"/>
  <!-- Smile -->
  <path d="M45 75 Q60 90 75 75" fill="none" stroke="#202024" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="38" cy="72" rx="6" ry="4" fill="#DD0E1E" opacity="0.3"/>
  <ellipse cx="82" cy="72" rx="6" ry="4" fill="#DD0E1E" opacity="0.3"/>
  <!-- Left hand waving -->
  <path d="M18 55 Q5 45 8 30" fill="none" stroke="#2A7A8C" stroke-width="3" stroke-linecap="round"/>
  <circle cx="8" cy="28" r="4" fill="#5BC0DE" stroke="#2A7A8C" stroke-width="2"/>
  <!-- Right hand thumbs up -->
  <path d="M102 55 Q115 50 112 35" fill="none" stroke="#2A7A8C" stroke-width="3" stroke-linecap="round"/>
  <circle cx="112" cy="33" r="4" fill="#5BC0DE" stroke="#2A7A8C" stroke-width="2"/>
</svg>
