<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Glass pane body -->
  <rect x="40" y="30" width="120" height="160" rx="12" ry="12" fill="#4FC3F7" stroke="#0288D1" stroke-width="3" opacity="0.85"/>
  <!-- Glass shine -->
  <rect x="55" y="45" width="40" height="60" rx="6" fill="rgba(255,255,255,0.45)" transform="rotate(-5 75 75)"/>
  <!-- Window frame cross -->
  <line x1="100" y1="30" x2="100" y2="190" stroke="#0288D1" stroke-width="3"/>
  <line x1="40" y1="110" x2="160" y2="110" stroke="#0288D1" stroke-width="3"/>
  <!-- Left eye -->
  <ellipse cx="78" cy="85" rx="12" ry="14" fill="white"/>
  <ellipse cx="80" cy="87" rx="6" ry="7" fill="#1A237E"/>
  <ellipse cx="82" cy="84" rx="2.5" ry="2.5" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="122" cy="85" rx="12" ry="14" fill="white"/>
  <ellipse cx="124" cy="87" rx="6" ry="7" fill="#1A237E"/>
  <ellipse cx="126" cy="84" rx="2.5" ry="2.5" fill="white"/>
  <!-- Smile -->
  <path d="M82 130 Q100 150 118 130" stroke="#0D47A1" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left arm (waving) -->
  <path d="M40 120 Q20 100 15 70" stroke="#0288D1" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="15" cy="67" r="6" fill="#4FC3F7" stroke="#0288D1" stroke-width="2"/>
  <!-- Right arm (thumbs up) -->
  <path d="M160 120 Q180 105 178 80" stroke="#0288D1" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M178 80 L178 65" stroke="#0288D1" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="178" cy="62" r="5" fill="#4FC3F7" stroke="#0288D1" stroke-width="2"/>
  <!-- Left leg -->
  <path d="M75 190 Q70 215 60 230" stroke="#0288D1" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="57" cy="232" rx="10" ry="5" fill="#0288D1"/>
  <!-- Right leg -->
  <path d="M125 190 Q130 215 140 230" stroke="#0288D1" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="143" cy="232" rx="10" ry="5" fill="#0288D1"/>
  <!-- Hard hat (construction) -->
  <ellipse cx="100" cy="32" rx="55" ry="10" fill="#FDD835" stroke="#F9A825" stroke-width="2"/>
  <path d="M55 32 Q55 5 100 0 Q145 5 145 32" fill="#FDD835" stroke="#F9A825" stroke-width="2"/>
  <rect x="85" y="0" width="30" height="8" rx="4" fill="#F9A825"/>
</svg>